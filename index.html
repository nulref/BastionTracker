<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bastion Tracker</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="app-bar">
      <div class="app-bar__title">
        <span class="mark" aria-hidden="true"></span>
        <span>Bastion Tracker</span>
      </div>
      <div class="toolbar" aria-label="Tracker menu">
        <button class="menu-trigger" type="button" aria-label="Open menu" aria-controls="actionMenu" aria-expanded="false" data-action="menu-toggle">
          <span aria-hidden="true">&#8942;</span>
        </button>
        <div class="action-menu" id="actionMenu" role="menu" hidden>
          <button type="button" role="menuitem" data-action="github-pull">Load</button>
          <button type="button" role="menuitem" data-action="github-push">Save</button>
          <button type="button" role="menuitem" data-action="github-settings">Settings</button>
          <button type="button" role="menuitem" data-action="print">Print</button>
        </div>
      </div>
      <output class="save-state" id="saveState" aria-live="polite">Loading</output>
    </header>

    <main class="page-shell">
      <form id="trackerForm" class="tracker" autocomplete="off">
        <section class="tracker-heading" aria-labelledby="trackerTitle">
          <div class="title-frame">
            <h1 id="trackerTitle">Bastion Tracker</h1>
          </div>

          <label class="field field--wide">
            <span>Bastion's Name:</span>
            <input type="text" data-field="bastionName" aria-label="Bastion name">
          </label>

          <div class="identity-row">
            <label class="field">
              <span>Character's Name:</span>
              <input type="text" data-field="characterName" aria-label="Character name">
            </label>
            <label class="field field--level">
              <span>Level:</span>
              <input type="text" inputmode="numeric" data-field="level" aria-label="Character level">
            </label>
          </div>
        </section>

        <section class="basic-section" aria-labelledby="basicTitle">
          <div class="section-ribbon">
            <h2 id="basicTitle">Basic Facilities</h2>
          </div>
          <div class="basic-grid" id="basicFacilities"></div>
          <label class="field defenders-field">
            <span>Bastion Defenders:</span>
            <input type="text" data-field="bastionDefenders" aria-label="Bastion defenders">
          </label>
        </section>

        <section class="facility-grid" id="specialFacilities" aria-label="Special facilities"></section>
      </form>
    </main>

    <template id="basicLineTemplate">
      <label class="line-field">
        <span class="visually-hidden"></span>
        <input type="text">
      </label>
    </template>

    <template id="facilityTemplate">
      <article class="facility-card">
        <label class="facility-name">
          <span>Special Facility:</span>
          <input type="text">
        </label>
        <div class="facility-card__body">
          <label class="compact-field compact-field--space">
            <span>Space:</span>
            <input type="text">
          </label>
          <label class="compact-field compact-field--order">
            <span>Order:</span>
            <input type="text">
          </label>
          <label class="compact-field compact-field--hirelings">
            <span>Hirelings:</span>
            <input type="text">
          </label>
          <label class="notes-field">
            <span>Notes</span>
            <textarea rows="5"></textarea>
          </label>
        </div>
      </article>
    </template>

    <dialog class="sync-dialog" id="githubDialog" aria-labelledby="githubDialogTitle">
      <form class="sync-form" id="githubForm" method="dialog">
        <div class="sync-form__header">
          <h2 id="githubDialogTitle">GitHub Sync</h2>
          <button type="button" data-action="github-close" aria-label="Close GitHub settings">Close</button>
        </div>

        <div class="sync-form__grid">
          <label>
            <span>Owner</span>
            <input type="text" name="owner" autocomplete="off">
          </label>
          <label>
            <span>Repository</span>
            <input type="text" name="repo" autocomplete="off">
          </label>
          <div class="branch-picker">
            <label>
              <span>Branch</span>
              <select name="branch" autocomplete="off">
                <option value="main">main</option>
              </select>
            </label>
            <button type="button" data-action="github-refresh-branches">Refresh Branches</button>
          </div>
          <label>
            <span>JSON Path</span>
            <input type="text" name="path" autocomplete="off">
          </label>
          <label class="sync-form__wide">
            <span>Fine-Grained Token</span>
            <input type="password" name="token" autocomplete="off">
          </label>
          <label>
            <span>Token Storage</span>
            <select name="tokenStorage">
              <option value="session">This tab</option>
              <option value="local">This browser</option>
            </select>
          </label>
          <label>
            <span>Committer Name</span>
            <input type="text" name="committerName" autocomplete="name">
          </label>
          <label class="sync-form__wide">
            <span>Committer Email</span>
            <input type="email" name="committerEmail" autocomplete="email">
          </label>
        </div>

        <div class="sync-form__actions">
          <button type="button" data-action="github-save-settings">Save Settings</button>
          <button type="button" data-action="github-disconnect">Disconnect</button>
          <output id="githubStatus" aria-live="polite"></output>
        </div>
      </form>
    </dialog>

    <script src="app.js" defer></script>
  </body>
</html>
